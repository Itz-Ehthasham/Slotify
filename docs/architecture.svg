<svg xmlns="http://www.w3.org/2000/svg" width="720" height="420" viewBox="0 0 720 420">
  <defs>
    <style>
      .box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; rx: 8; }
      .title { font: 700 15px system-ui, -apple-system, sans-serif; fill: #111; }
      .sub { font: 500 12px system-ui, -apple-system, sans-serif; fill: #4b5563; }
      .lime { fill: #ccfd04; }
      .arrow { stroke: #1a1a1a; stroke-width: 1.5; fill: none; marker-end: url(#m); }
    </style>
    <marker id="m" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#1a1a1a"/>
    </marker>
  </defs>
  <rect width="100%" height="100%" fill="#f9fafb"/>
  <text x="360" y="36" text-anchor="middle" class="title" font-size="18">Slotify  high-level architecture</text>
  <rect x="40" y="70" width="160" height="72" class="box"/>
  <rect x="40" y="70" width="160" height="14" class="lime"/>
  <text x="120" y="108" text-anchor="middle" class="title">Expo / React Native</text>
  <text x="120" y="128" text-anchor="middle" class="sub">expo-router UI</text>
  <rect x="280" y="70" width="160" height="88" class="box"/>
  <rect x="280" y="70" width="160" height="14" class="lime"/>
  <text x="360" y="105" text-anchor="middle" class="title">Screens &amp; flows</text>
  <text x="360" y="124" text-anchor="middle" class="sub">Home Ę Providers Ę Booking</text>
  <text x="360" y="142" text-anchor="middle" class="sub">Appointments Ę Notifications</text>
  <rect x="520" y="70" width="160" height="72" class="box"/>
  <rect x="520" y="70" width="160" height="14" class="lime"/>
  <text x="600" y="108" text-anchor="middle" class="title">Auth session</text>
  <text x="600" y="128" text-anchor="middle" class="sub">users / currentUser</text>
  <path d="M200 106 L275 106" class="arrow"/>
  <path d="M440 106 L515 106" class="arrow"/>
  <rect x="200" y="220" width="320" height="100" class="box"/>
  <rect x="200" y="220" width="320" height="14" class="lime"/>
  <text x="360" y="255" text-anchor="middle" class="title">AsyncStorage (device)</text>
  <text x="360" y="278" text-anchor="middle" class="sub">Bookings (scoped by userId) Ę Notifications Ę Last-seen</text>
  <text x="360" y="298" text-anchor="middle" class="sub">Provider lists &amp; mock data (in bundle)</text>
  <path d="M360 158 L360 215" class="arrow"/>
  <text x="372" y="188" class="sub">read / write</text>
</svg>
